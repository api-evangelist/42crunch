naftiko: 1.0.0-alpha2
info:
  label: 42Crunch API Conformance Scan Jobs Manager — Logs
  description: '42Crunch API Conformance Scan Jobs Manager — Logs. 1 operations. Lead operation: 42Crunch Get Scan Job Logs.
    Self-contained Naftiko capability covering one 42crunch business surface.'
  tags:
  - 42crunch
  - Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    42CRUNCH_API_KEY: 42CRUNCH_API_KEY
capability:
  consumes:
  - type: http
    namespace: scand-manager-logs
    baseUri: http://localhost:8090
    description: 42Crunch API Conformance Scan Jobs Manager — Logs business capability. Self-contained, no shared references.
    resources:
    - name: api-logs-name
      path: /api/logs/{name}
      operations:
      - name: getlogs
        method: GET
        description: 42Crunch Get Scan Job Logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The name of the scan job whose logs should be retrieved
          required: true
  exposes:
  - type: rest
    namespace: scand-manager-logs-rest
    port: 8080
    description: REST adapter for 42Crunch API Conformance Scan Jobs Manager — Logs. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/logs/{name}
      name: api-logs-name
      description: REST surface for api-logs-name.
      operations:
      - method: GET
        name: getlogs
        description: 42Crunch Get Scan Job Logs
        call: scand-manager-logs.getlogs
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: scand-manager-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for 42Crunch API Conformance Scan Jobs Manager — Logs. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: 42crunch-get-scan-job-logs
      description: 42Crunch Get Scan Job Logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: scand-manager-logs.getlogs
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
