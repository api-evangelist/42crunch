  - type: Features
    data:
      - name: API Security Audit
        description: >-
          Automated static analysis of OpenAPI and GraphQL definitions running
          over 200 security checks, scoring APIs 0-100 for vulnerability and
          compliance issues.
      - name: API Scan (DAST)
        description: >-
          Dynamic API Security Testing that evaluates runtime API behavior against
          its OpenAPI contract, identifying vulnerabilities that appear only at runtime.
      - name: API Firewall
        description: >-
          API-native micro firewall that enforces OpenAPI contract compliance at
          runtime, blocking malformed requests, unauthorized access, and API attacks.
      - name: API Discovery
        description: >-
          Identifies and catalogs APIs across environments to provide full visibility
          into the API attack surface.
      - name: CI/CD Integration
        description: >-
          GitHub Actions and other CI/CD pipeline integrations for automated security
          scanning in deployment workflows.
      - name: IDE Integration
        description: >-
          Plugins for VS Code and IntelliJ/JetBrains IDEs that provide real-time
          OpenAPI editing, validation, and security feedback during API design.
      - name: OpenAPI Contract Security
        description: >-
          Enforces security best practices in OpenAPI specifications covering
          authentication, data validation, input/output schemas, and transport security.
      - name: Kubernetes Support
        description: >-
          Scand Manager provides a Kubernetes wrapper for running 42Crunch API Scan
          in containerized environments.
  - type: UseCases
    data:
      - name: API Security Testing in CI/CD
        description: >-
          Embed automated API security scanning into CI/CD pipelines via GitHub Actions
          to catch vulnerabilities before they reach production.
      - name: OpenAPI Specification Review
        description: >-
          Audit OpenAPI definitions for security flaws, missing authentication,
          weak data validation, and schema gaps before API deployment.
      - name: Runtime API Protection
        description: >-
          Deploy the API Firewall in front of production APIs to enforce contract
          compliance and block attacks in real time.
      - name: DevSecOps API Governance
        description: >-
          Provide development, security, and operations teams with shared visibility
          into API security posture throughout the API lifecycle.
      - name: OWASP API Top 10 Compliance
        description: >-
          Systematically identify and remediate OWASP API Security Top 10
          vulnerabilities in API definitions and runtime behavior.
      - name: API Security for Financial Services
        description: >-
          Address regulatory and compliance requirements for API security in
          banking, financial services, and insurance sectors.
      - name: Healthcare API Security
        description: >-
          Secure healthcare APIs handling sensitive patient data against
          unauthorized access and data exposure vulnerabilities.
  - type: Integrations
    data:
      - name: GitHub Actions
        description: >-
          Native GitHub Actions for API Security Audit and API Scan, enabling
          automated security checks in GitHub CI/CD workflows.
      - name: VS Code
        description: >-
          OpenAPI extension for Visual Studio Code providing real-time API editing,
          validation, and security feedback with 42Crunch integration.
      - name: IntelliJ / JetBrains
        description: >-
          OpenAPI/Swagger Editor plugin for IntelliJ IDEA and other JetBrains IDEs.
      - name: Kubernetes
        description: >-
          Scand Manager provides Kubernetes-native deployment of API Scan for
          containerized API security testing.
      - name: Tekton
        description: >-
          Tekton Pipelines catalog integration for CI/CD security scanning tasks.
      - name: SonarQube
        description: >-
          SonarQube plugin that integrates 42Crunch API security audit results
          into code quality dashboards.
      - name: API Gateways
        description: >-
          API Firewall integrates with API gateway infrastructure to enforce
          contract compliance at the network edge.
      - name: SIEM / SOC Systems
        description: >-
          Runtime protection events can be forwarded to SIEM and SOC platforms
          for centralized threat monitoring and alerting.
      - name: Atlassian
        description: >-
          Data Center App Performance Toolkit support for Atlassian platform
          integration.
