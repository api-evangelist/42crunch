apis:
  - aid: 42crunch:42crunch-api-security-audit
    name: 42Crunch API Security Audit
    tags:
      - API Security
      - Static Analysis
      - OpenAPI
      - Vulnerability Scanning
    humanURL: https://docs.42crunch.com/latest/content/concepts/api_contract_security_audit.htm
    properties:
      - url: https://docs.42crunch.com/latest/content/concepts/api_contract_security_audit.htm
        type: Documentation
      - url: https://docs.42crunch.com/latest/content/home.htm
        type: APIReference
    description: >-
      The 42Crunch API Security Audit performs automated static analysis of API
      definitions (OpenAPI 2, 3.0, 3.1 and GraphQL), running over 200 checks across
      format validation, data definition quality, and security analysis. APIs are
      scored 0-100 with recommendations to reach 70+ before runtime protection is
      applied. Integrates with CI/CD pipelines for continuous monitoring.

  - aid: 42crunch:42crunch-api-scan
    name: 42Crunch API Scan
    tags:
      - API Security
      - Dynamic Testing
      - DAST
      - Contract Testing
    humanURL: https://docs.42crunch.com/latest/content/home.htm
    properties:
      - url: https://docs.42crunch.com/latest/content/home.htm
        type: Documentation
    description: >-
      42Crunch API Scan performs dynamic API security testing (DAST) that evaluates
      runtime API behavior against its OpenAPI specification. It tests how well an
      API adheres to its contract and identifies vulnerabilities that only appear
      at runtime. Supports integration with CI/CD pipelines and Kubernetes via
      the scand-manager Kubernetes wrapper.

  - aid: 42crunch:42crunch-api-protection
    name: 42Crunch API Protection
    tags:
      - API Security
      - Runtime Protection
      - Firewall
      - API Gateway
    humanURL: https://docs.42crunch.com/latest/content/home.htm
    properties:
      - url: https://docs.42crunch.com/latest/content/home.htm
        type: Documentation
    description: >-
      42Crunch API Protection deploys an API-native micro firewall (API Firewall)
      that provides runtime defense against API attacks. The firewall is tailor-made
      for each API based on its OpenAPI specification and enforces API contract
      compliance in real time, blocking malformed requests and unauthorized access.

