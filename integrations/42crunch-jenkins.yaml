naftiko: 1.0.0-alpha2
info:
  label: Gate Jenkins deployments on 42Crunch scan results
  description: From a Jenkins pipeline, invoke 42Crunch to scan the candidate API spec and block promotion to staging when critical conformance issues exist.
  tags:
  - 42Crunch
  - Integration
  - CI/CD
  - jenkins
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    42CRUNCH_API_KEY: 42CRUNCH_API_KEY
    JENKINS_API_KEY: JENKINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: 42crunch
    baseUri: https://api.42crunch.com
    description: 42Crunch API operations consumed by this integration.
    resources:
    - name: api-job
      path: /api/job
      operations:
      - name: createjob
        method: POST
        description: Kick off a 42Crunch scan from the Jenkins build step.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-job-name
      path: /api/job/{name}
      operations:
      - name: getjob
        method: GET
        description: Poll job status from the Jenkins pipeline.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Path parameter name.
          required: true
    - name: api-logs-name
      path: /api/logs/{name}
      operations:
      - name: getlogs
        method: GET
        description: Attach the scan log to the Jenkins build artifacts.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Path parameter name.
          required: true
  - type: http
    namespace: jenkins
    baseUri: https://jenkins.example.com
    description: Jenkins Remote Access API operations consumed by this integration.
    resources:
    - name: job-job-name-build
      path: /job/{job_name}/build
      operations:
      - name: triggerbuild
        method: POST
        description: 'Jenkins Remote Access API: triggerBuild'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: job_name
          in: path
          type: string
          description: Path parameter job_name.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: job-job-name-build-number-api-json
      path: /job/{job_name}/{build_number}/api/json
      operations:
      - name: getbuild
        method: GET
        description: 'Jenkins Remote Access API: getBuild'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: job_name
          in: path
          type: string
          description: Path parameter job_name.
          required: true
        - name: build_number
          in: path
          type: string
          description: Path parameter build_number.
          required: true
  exposes:
  - type: mcp
    namespace: 42crunch-jenkins-mcp
    description: MCP adapter for the 42crunch-jenkins integration.
    tools:
    - name: 42crunch_jenkins
      description: Execute the 42crunch jenkins integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: 42crunch-jenkins-rest
    port: 8080
    description: REST adapter for the 42crunch-jenkins integration.
    resources:
    - path: /42crunch-jenkins
      name: 42crunch-jenkins
      description: REST surface for the 42crunch-jenkins integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the 42crunch-jenkins integration.
        call: 42crunch_jenkins
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
