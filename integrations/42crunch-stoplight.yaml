naftiko: 1.0.0-alpha2
info:
  label: Mirror 42Crunch findings into Stoplight project notes
  description: When a 42Crunch scan finishes for a Stoplight-hosted OpenAPI project, post the critical issues into the project so designers can fix problems at the spec level.
  tags:
  - 42Crunch
  - Integration
  - API design
  - stoplight
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    42CRUNCH_API_KEY: 42CRUNCH_API_KEY
    STOPLIGHT_API_KEY: STOPLIGHT_API_KEY
capability:
  consumes:
  - type: http
    namespace: 42crunch
    baseUri: https://api.42crunch.com
    description: 42Crunch API operations consumed by this integration.
    resources:
    - name: api-job
      path: /api/job
      operations:
      - name: createjob
        method: POST
        description: Trigger a scan on the Stoplight-hosted spec.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-job-name
      path: /api/job/{name}
      operations:
      - name: getjob
        method: GET
        description: Poll the 42Crunch scan job.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Path parameter name.
          required: true
    - name: api-logs-name
      path: /api/logs/{name}
      operations:
      - name: getlogs
        method: GET
        description: Retrieve findings to mirror into Stoplight.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Path parameter name.
          required: true
  - type: http
    namespace: stoplight
    baseUri: https://api.stoplight.io
    description: Stoplight Platform API operations consumed by this integration.
    resources:
    - name: v1-workspaces-workspace-id-projects-project-id-issues
      path: /v1/workspaces/{workspace_id}/projects/{project_id}/issues
      operations:
      - name: createissue
        method: POST
        description: 'Stoplight Platform API: createIssue'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace_id
          in: path
          type: string
          description: Path parameter workspace_id.
          required: true
        - name: project_id
          in: path
          type: string
          description: Path parameter project_id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: 42crunch-stoplight-mcp
    description: MCP adapter for the 42crunch-stoplight integration.
    tools:
    - name: 42crunch_stoplight
      description: Execute the 42crunch stoplight integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: 42crunch-stoplight-rest
    port: 8080
    description: REST adapter for the 42crunch-stoplight integration.
    resources:
    - path: /42crunch-stoplight
      name: 42crunch-stoplight
      description: REST surface for the 42crunch-stoplight integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the 42crunch-stoplight integration.
        call: 42crunch_stoplight
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
