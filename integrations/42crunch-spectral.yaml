naftiko: 1.0.0-alpha2
info:
  label: Pair Spectral lint findings with 42Crunch conformance scans
  description: Combine Stoplight Spectral OpenAPI lint output with 42Crunch runtime conformance scan results into a unified API quality + security report for a single PR.
  tags:
  - 42Crunch
  - Integration
  - API quality
  - spectral
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    42CRUNCH_API_KEY: 42CRUNCH_API_KEY
    SPECTRAL_API_KEY: SPECTRAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: 42crunch
    baseUri: https://api.42crunch.com
    description: 42Crunch API operations consumed by this integration.
    resources:
    - name: api-job
      path: /api/job
      operations:
      - name: createjob
        method: POST
        description: Run a 42Crunch scan on the same OpenAPI definition Spectral linted.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-job-name
      path: /api/job/{name}
      operations:
      - name: getjob
        method: GET
        description: Poll the conformance scan job.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Path parameter name.
          required: true
    - name: api-logs-name
      path: /api/logs/{name}
      operations:
      - name: getlogs
        method: GET
        description: Pull scan results to merge with Spectral output.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Path parameter name.
          required: true
  - type: http
    namespace: spectral
    baseUri: https://api.stoplight.io
    description: Stoplight Spectral API operations consumed by this integration.
    resources:
    - name: v1-projects-project-id-linting
      path: /v1/projects/{project_id}/linting
      operations:
      - name: lintspec
        method: POST
        description: 'Stoplight Spectral API: lintSpec'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_id
          in: path
          type: string
          description: Path parameter project_id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: 42crunch-spectral-mcp
    description: MCP adapter for the 42crunch-spectral integration.
    tools:
    - name: 42crunch_spectral
      description: Execute the 42crunch spectral integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: 42crunch-spectral-rest
    port: 8080
    description: REST adapter for the 42crunch-spectral integration.
    resources:
    - path: /42crunch-spectral
      name: 42crunch-spectral
      description: REST surface for the 42crunch-spectral integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the 42crunch-spectral integration.
        call: 42crunch_spectral
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
