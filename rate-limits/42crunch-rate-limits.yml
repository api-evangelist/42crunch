specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: 42Crunch
providerId: 42crunch
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - API Security
  - DevSecOps
  - Rate Limiting
description: 42Crunch does not publish per-second rate limits for its platform APIs. The user-facing constraint
  is the per-month operations quota in the Free (100) and Single User (2,000) plans, which functions as
  a soft consumption ceiling. Teams and Enterprise plans have unlimited operations on contracted endpoints.
notes: No public per-second / per-minute rate-limit documentation. Quotas in `limits` reflect plan-level
  monthly operation caps rather than infrastructure throttling.
sources:
  - https://42crunch.com/pricing/
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Free plan monthly operations
    scope: account
    metric: operations_per_month
    limit: 100
    timeFrame: month
    notes: Combined cap across Audit, Scan, and Contract Generator.
  - name: Single User plan monthly operations
    scope: account
    metric: operations_per_month
    limit: 2000
    timeFrame: month
    notes: Combined cap across Audit, Scan, and Contract Generator.
  - name: Teams / Enterprise operations
    scope: account
    metric: varies
    limit: unlimited on contracted endpoints; subject to fair-use throttling
    notes: Endpoint count drives the Teams (>=75) and Enterprise (>=250) plan minimums; operations on
      those endpoints are not metered.
policies:
  - name: Endpoint-scoped contracts
    description: Teams and Enterprise tiers price by the number of contracted endpoints rather than by
      request volume; adding endpoints is the cost lever, not throttling.
  - name: Quota reset
    description: Free and Single User operation counters reset at the start of each calendar month.
  - name: Support raise
    description: Sustained high-volume scanning on Teams/Enterprise should be coordinated with 42Crunch
      support to avoid fair-use throttling.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
