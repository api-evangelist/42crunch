specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: 42Crunch
providerId: 42crunch
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Security
  - DevSecOps
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps for 42Crunch — tiered subscription priced on seats and contracted endpoints,
  with operation quotas on Free / Single User and unlimited operations on Teams / Enterprise.
sources:
  - https://42crunch.com/pricing/
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: 42Crunch Ltd.
serviceCategory: API Security
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: 42Crunch API Security Platform
  ServiceCategory: API Security
  ProviderName: 42Crunch
  PublisherName: 42Crunch Ltd.
  InvoiceIssuerName: 42Crunch Ltd.
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Tiered Subscription
  PricingUnit: seat-month
meters:
  - name: seat_month
    description: Active platform user seats per month.
    unit: seat
    aggregation: sum
    dimensions:
      - plan
      - role
  - name: contracted_endpoints
    description: API endpoints under contract on Teams / Enterprise plans (drives plan minimums and renewal
      sizing).
    unit: endpoint
    aggregation: max
    dimensions:
      - plan
      - api
  - name: audit_operations
    description: API Audit static-analysis runs (counts against Free/Single User quota; uncapped on Teams/Enterprise).
    unit: operation
    aggregation: sum
    dimensions:
      - plan
      - api
  - name: scan_operations
    description: API Scan dynamic-test runs.
    unit: operation
    aggregation: sum
    dimensions:
      - plan
      - api
  - name: contract_generator_operations
    description: API Contract Generator runs.
    unit: operation
    aggregation: sum
    dimensions:
      - plan
      - api
principles:
  - name: Visibility
    description: Use the 42Crunch SaaS platform dashboards to track operations consumed vs plan ceiling
      and contracted-endpoint utilization.
  - name: Allocation
    description: Tag APIs by team / business unit in the platform to attribute operation counts and endpoint
      coverage to the responsible product groups.
  - name: Optimization
    description: Reduce redundant scans by gating CI/CD runs to changed contracts; right-size the contracted
      endpoint count at renewal rather than provisioning Teams/Enterprise above actual API surface.
  - name: Accountability
    description: AppSec or Platform Security team owns the subscription; product engineering owners are
      accountable for keeping their APIs inside the contracted endpoint count.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
